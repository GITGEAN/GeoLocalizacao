version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: geomanager_sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=GeoManager@2026!
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./Database:/script
    command: >
      bash -c "
      /opt/mssql/bin/sqlservr & 
      echo 'Waiting for SQL Server to start...' &&
      sleep 20 &&
      echo 'Running initialization script...' &&
      /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'GeoManager@2026!' -C -i /script/init.sql &&
      echo 'Database initialized successfully!' &&
      wait"

volumes:
  sqlserver_data:
