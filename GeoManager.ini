; =============================================================================
; GeoManager - Arquivo de Configuração
; =============================================================================
; Este arquivo INI é o padrão de configuração em aplicações Delphi corporativas.
; O aplicativo lê este arquivo ao iniciar via TIniFile ou TMemIniFile.
;
; FORMATO: [Seção] seguida de Chave=Valor
; Linhas começando com ; são comentários
; =============================================================================

[DATABASE]
; Tipo do banco: SQLSERVER ou ORACLE
Tipo=SQLITE
; Endereço do servidor de banco de dados
Servidor=localhost
; Porta de conexão (SQL Server padrão: 1433, Oracle padrão: 1521)
Porta=1433
; Nome do banco de dados / service name (Oracle)
; Para SQLite: caminho completo ou relativo do arquivo .db
Banco=Database\GeoManager.db
; Credenciais (para Docker: sa / GeoManager@2026!)
; Deixe vazio para Windows Authentication no SQL Server
Usuario=
Senha=

[ARCGIS]
; URL base dos serviços ArcGIS REST
BaseURL=https://geocode.arcgis.com/arcgis/rest/services
; API Key do ArcGIS Developer (obtenha em https://developers.arcgis.com)
; Necessária para geocodificação e serviços premium
ApiKey=

[MAPA]
; Centro padrão do mapa (Brasília, Brasil)
CentroLatitude=-15.7939
CentroLongitude=-47.8828
; Nível de zoom padrão (1=mundo, 5=país, 10=cidade, 15=bairro, 20=rua)
ZoomPadrao=5

[LOG]
; Nível mínimo de log: DEBUG, INFO, WARNING, ERROR, FATAL
Nivel=INFO
; Gravar log em arquivo (True/False)
Arquivo=True
; Caminho do arquivo de log (relativo ao executável)
CaminhoArquivo=logs\geomanager.log
